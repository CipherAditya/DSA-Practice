name: Auto-Tweet Progress
on:
  push:
    branches:
      - main  # Wakes up when a commit hits your main branch
    paths:
      - '**/*.js'   # Triggers if a JavaScript file is added/changed
      - '**/*.java' # Triggers if a Java file is added/changed
      - '**/*.cpp'  # Triggers if a C++ file is added/changed
      - '**/*.py'   # Triggers if a Python file is added/changed

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetches the commit history to grab message details

      - name: Parse Latest Commit Message
        id: parse_msg
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Post to X (API V2)
        uses: noweh/post-tweet-v2-action@v1.0
        with:
          message: |
            Another one down! 🚀 

            Latest progress: ${{ steps.parse_msg.outputs.msg }}

            #DSA #BuildInPublic #Coding
          consumer-key: ${{ secrets.TWITTER_CONSUMER_KEY }}
          consumer-secret: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          access-token: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
